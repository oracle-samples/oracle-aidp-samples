# Supply Chain Data Generator Configuration
# Use with data_generator.py from repository

output_path: './supply_chain_data'
output_format: 'both'

tables:
  - table_name: inventory
    rows_count: 50
    columns:
      - name: product_id
        type: string
        prefix: 'PROD-'
        length: 3
        unique: true
      - name: product_name
        type: choice
        values: ['Laptop', 'Mouse', 'Keyboard', 'Monitor', 'Chair', 'Desk']
      - name: category
        type: choice
        values: ['Electronics', 'Furniture']
      - name: stock_qty
        type: integer
        range: [10, 500]
      - name: reorder_level
        type: integer
        range: [50, 150]
      - name: warehouse
        type: choice
        values: ['WH-001', 'WH-002', 'WH-003']
      - name: last_updated
        type: date
        format: '%Y-%m-%d'

  - table_name: orders
    rows_count: 100
    columns:
      - name: order_id
        type: string
        prefix: 'ORD-'
        length: 4
        unique: true
      - name: customer_name
        type: choice
        values: ['Acme Corp', 'TechStart Inc', 'Global Ltd', 'SmartOffice']
      - name: order_date
        type: date
        format: '%Y-%m-%d'
      - name: status
        type: choice
        values: ['PENDING', 'PROCESSING', 'IN_TRANSIT', 'DELIVERED', 'DELAYED']
        weights: [10, 20, 30, 35, 5]
      - name: total_amount
        type: float
        range: [500.0, 50000.0]
        decimals: 2

  - table_name: suppliers
    rows_count: 20
    columns:
      - name: supplier_id
        type: string
        prefix: 'SUP-'
        length: 3
        unique: true
      - name: supplier_name
        type: choice
        values: ['TechComponents', 'GlobalSupply', 'QualityParts', 'FastShip']
      - name: category
        type: choice
        values: ['Electronics', 'Furniture', 'Logistics']
      - name: rating
        type: float
        range: [7.0, 10.0]
        decimals: 1
      - name: on_time_pct
        type: float
        range: [85.0, 99.9]
        decimals: 2
