services:
  aidp-customer-workbench:
    build:
      context: .
      dockerfile: Containerfile
    image: aidp-customer-workbench:local
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      HOST: "0.0.0.0"
      AIDP_PROXY_MODE: "${AIDP_PROXY_MODE:-fixture}"
      AIDP_WORKBENCH_API_BASE_URL: "${AIDP_WORKBENCH_API_BASE_URL:-}"
      AIDP_WORKBENCH_API_VERSION: "${AIDP_WORKBENCH_API_VERSION:-20260430}"
      AIDP_SERVICE_API_AUTH_HEADER: "${AIDP_SERVICE_API_AUTH_HEADER:-}"
      AIDP_SERVICE_API_BEARER_TOKEN: "${AIDP_SERVICE_API_BEARER_TOKEN:-}"
      AIDP_OCI_PROFILE: "${AIDP_OCI_PROFILE:-DEFAULT}"
      AIDP_OCI_AUTH: "${AIDP_OCI_AUTH:-security_token}"
      AIDP_UPSTREAM_TIMEOUT_MS: "${AIDP_UPSTREAM_TIMEOUT_MS:-30000}"
    restart: unless-stopped
